services:
  hub-a:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=test-federation-secret
      - DATABASE_PATH=/app/data/poutine.db
      - NAVIDROME_URL=http://navidrome-a:4533
      - NAVIDROME_USERNAME=admin
      - NAVIDROME_PASSWORD=federation-nav-pw
      - POUTINE_INSTANCE_ID=poutine-a
      - POUTINE_PRIVATE_KEY_PATH=/app/config/key.pem
      - POUTINE_PEERS_CONFIG=/app/config/peers.yaml
      - POUTINE_OWNER_USERNAME=owner
      - POUTINE_OWNER_PASSWORD=federation-test-password
    volumes:
      - hub-a-data:/app/data
      - ./test/federation/peers-a.yaml:/app/config/peers.yaml:ro
      - ./test/federation/keys/poutine-a_ed25519.pem:/app/config/key.pem:ro
    depends_on:
      - navidrome-a
    networks:
      - federation
      - internal-a
    restart: unless-stopped

  navidrome-a:
    image: deluan/navidrome:latest
    environment:
      - ND_LOGLEVEL=info
      - ND_SCANSCHEDULE=0  # scan once at startup only
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - ND_ENABLEEXTERNALSERVICES=false
      - ND_DEVAUTOCREATEADMINPASSWORD=federation-nav-pw
      - ND_ENCRYPTIONKEY=test-federation-secret
    volumes:
      - navidrome-a-data:/data
      - ${FED_MUSIC_A:-./test/federation/fixtures/music-a}:/music:ro
    networks:
      - internal-a
    restart: unless-stopped

  hub-b:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=test-federation-secret
      - DATABASE_PATH=/app/data/poutine.db
      - NAVIDROME_URL=http://navidrome-b:4533
      - NAVIDROME_USERNAME=admin
      - NAVIDROME_PASSWORD=federation-nav-pw
      - POUTINE_INSTANCE_ID=poutine-b
      - POUTINE_PRIVATE_KEY_PATH=/app/config/key.pem
      - POUTINE_PEERS_CONFIG=/app/config/peers.yaml
      - POUTINE_OWNER_USERNAME=owner
      - POUTINE_OWNER_PASSWORD=federation-test-password
    volumes:
      - hub-b-data:/app/data
      - ./test/federation/peers-b.yaml:/app/config/peers.yaml:ro
      - ./test/federation/keys/poutine-b_ed25519.pem:/app/config/key.pem:ro
    depends_on:
      - navidrome-b
    networks:
      - federation
      - internal-b
    restart: unless-stopped

  navidrome-b:
    image: deluan/navidrome:latest
    environment:
      - ND_LOGLEVEL=info
      - ND_SCANSCHEDULE=0
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - ND_ENABLEEXTERNALSERVICES=false
      - ND_DEVAUTOCREATEADMINPASSWORD=federation-nav-pw
      - ND_ENCRYPTIONKEY=test-federation-secret
    volumes:
      - navidrome-b-data:/data
      - ${FED_MUSIC_B:-./test/federation/fixtures/music-b}:/music:ro
    networks:
      - internal-b
    restart: unless-stopped

volumes:
  hub-a-data:
  hub-b-data:
  navidrome-a-data:
  navidrome-b-data:

networks:
  # Shared network: hub-a and hub-b can reach each other by service name.
  # peers.yaml in each hub uses http://hub-a:3000 / http://hub-b:3000.
  federation:
  # Private hub-a <-> navidrome-a channel
  internal-a:
    internal: true
  # Private hub-b <-> navidrome-b channel
  internal-b:
    internal: true
